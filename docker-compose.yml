services:
  neo-nexus:
    build:
      context: .
    image: neo-nexus:local
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      NEONEXUS_DATA_DIR: /data
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET before running docker compose up}"
    volumes:
      - neo-nexus-data:/data

volumes:
  neo-nexus-data:
