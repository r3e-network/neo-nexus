apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "neo-cli.fullname" . }}
  labels:
    app: neo-cli
spec:
  serviceName: {{ include "neo-cli.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: neo-cli
  template:
    metadata:
      labels:
        app: neo-cli
    spec:
      {{- if .Values.snapshot.enabled }}
      initContainers:
        - name: init-snapshot
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ ! -d "/app/Data_LevelDB/Data_LevelDB" ]; then
                echo "Downloading snapshot from {{ .Values.snapshot.url }}..."
                wget -O /tmp/snapshot.tar.gz {{ .Values.snapshot.url }}
                echo "Extracting snapshot..."
                tar -xzf /tmp/snapshot.tar.gz -C /app/Data_LevelDB
                rm /tmp/snapshot.tar.gz
                echo "Snapshot initialized."
              else
                echo "Data directory already initialized, skipping snapshot."
              fi
          volumeMounts:
            - name: data
              mountPath: /app/Data_LevelDB
      {{- end }}
      containers:
        - name: neo-cli
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["dotnet", "neo-cli.dll", "--rpc"]
          ports:
            - name: p2p
              containerPort: {{ .Values.node.p2pPort }}
            - name: rpc
              containerPort: {{ .Values.node.rpcPort }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/Data_LevelDB
      volumes:
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: {{ .Values.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
