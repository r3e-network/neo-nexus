apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "neo-x.fullname" . }}
  labels:
    app: neo-x
spec:
  serviceName: {{ include "neo-x.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: neo-x
  template:
    metadata:
      labels:
        app: neo-x
    spec:
      {{- if .Values.snapshot.enabled }}
      initContainers:
        - name: init-snapshot
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ ! -d "/data/geth/chaindata" ]; then
                echo "Downloading Neo X snapshot from {{ .Values.snapshot.url }}..."
                wget -O /tmp/snapshot.tar.gz {{ .Values.snapshot.url }}
                echo "Extracting snapshot..."
                tar -xzf /tmp/snapshot.tar.gz -C /data
                rm /tmp/snapshot.tar.gz
                echo "Snapshot initialized."
              else
                echo "Data directory already initialized, skipping snapshot."
              fi
          volumeMounts:
            - name: data
              mountPath: /data
      {{- end }}
      containers:
        - name: neo-x-geth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["geth", "--http", "--http.addr", "0.0.0.0", "--http.port", "8545", "--ws", "--ws.addr", "0.0.0.0", "--ws.port", "8546", "--datadir", "/data"]
          ports:
            - name: rpc
              containerPort: {{ .Values.node.rpcPort }}
            - name: ws
              containerPort: {{ .Values.node.wsPort }}
            - name: p2p
              containerPort: {{ .Values.node.p2pPort }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: {{ .Values.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
